apiVersion: apps/v1
kind: Deployment
metadata:
  generation: 1
  labels:
    app: kubernetes-template
  name: kubernetes-template
  namespace: default
spec:
  progressDeadlineSeconds: 60
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: kubernetes-template
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kubernetes-template
    spec:
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

      hostNetwork: true
      containers:
      - name: kubernetes-template
        image: dreamacro/kubernetes-template:latest
        imagePullPolicy: IfNotPresent

        #command: ["/kubernetes-template", "-d", "/etc/kubernetes-template", "-f", "/etc/kubernetes-template/config.yaml"]
        
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - name: "socks"
          containerPort: 1080
        - name: "http"
          containerPort: 1087
        volumeMounts:
        - name: kubernetes-template-config
          mountPath: /root/.config/kubernetes-template/config.yaml
          subPath: config.yaml
          readOnly: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      volumes:
      - name: kubernetes-template-config
        configMap:
          name: kubernetes-template-config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      #securityContext:
        #runAsUser: 1000
        #runAsGroup: 1000
        #fsGroup: 1000
      terminationGracePeriodSeconds: 30
